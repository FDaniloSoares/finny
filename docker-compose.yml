services:
  postgres:
    image: postgres:16-alpine
    container_name: finny-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finny
      POSTGRES_PASSWORD: finny
      POSTGRES_DB: finny
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
